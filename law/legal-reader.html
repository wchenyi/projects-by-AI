<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>律典 · 法条阅读器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
/* ── Themes ── */
:root{
  --bg:#f7f3ec;--bg2:#ede8de;--bg3:#e3ddd0;
  --surface:#faf7f2;--surface2:#f0ebe0;
  --border:#d8ccb8;--border2:#c8b8a4;
  --text:#26190e;--text2:#5a4a38;--text3:#8a7a68;
  --accent:#7c3a12;--accent2:#b85f28;--accent-light:#f5ead8;
  --hl-y:#fff3a3;--hl-g:#b8f0c8;--hl-b:#b8d8f0;--hl-p:#f0b8d0;
  --sidebar-w:292px;
  --font-body:'Noto Serif SC',serif;--font-ui:'Noto Sans SC',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --fs:16px;--lh:2.1;--ls:0.04em;--indent:2em;--cw:760px;
  --sh:0 2px 16px rgba(60,30,10,.08);--sh2:0 8px 36px rgba(60,30,10,.16);
  --r:8px;--t:.18s ease;
}
[data-theme=dark]{--bg:#18160f;--bg2:#201d14;--bg3:#28231a;--surface:#1e1b12;--surface2:#262218;--border:#38321e;--border2:#48402e;--text:#e8dfc8;--text2:#b4a888;--text3:#706050;--accent:#d08040;--accent2:#e09a58;--accent-light:#301e08;--hl-y:#4a4008;--hl-g:#183818;--hl-b:#182038;--hl-p:#381028;}
[data-theme=sepia]{--bg:#f3ecdc;--bg2:#e8dec8;--bg3:#ddd3b8;--surface:#f8f3e8;--surface2:#ede4ce;--border:#c8ba98;--border2:#b8a880;--text:#362510;--text2:#685838;--text3:#988060;--accent:#6a4c18;--accent2:#9a7030;--accent-light:#ede0c0;}
[data-theme=night]{--bg:#0c0e14;--bg2:#121520;--bg3:#181b28;--surface:#0f1220;--surface2:#181c30;--border:#22283c;--border2:#2c3458;--text:#c0d0e8;--text2:#809ab8;--text3:#485878;--accent:#5880d0;--accent2:#78a0e8;--accent-light:#14203a;}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:var(--fs);line-height:var(--lh);transition:background .3s,color .3s;overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased;}

/* ── App layout ── */
.app{display:flex;height:100vh;overflow:hidden;}

/* ═══════════════════════ SIDEBAR ═══════════════════════ */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
  transition:width .28s ease,min-width .28s ease,transform .28s ease;
  position:relative;z-index:20;flex-shrink:0;
}
.sidebar.collapsed{width:0;min-width:0;}
.si{min-width:var(--sidebar-w);display:flex;flex-direction:column;height:100%;overflow:hidden;}

/* sidebar header */
.sb-head{padding:13px 16px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo{font-size:16px;font-weight:700;color:var(--accent);letter-spacing:.07em;white-space:nowrap;}
.logo em{color:var(--text);font-style:normal;font-weight:300;}

/* sidebar actions */
.sb-act{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font-ui);font-size:12px;cursor:pointer;transition:all var(--t);white-space:nowrap;font-weight:500;}
.btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-p:hover{background:var(--accent2);border-color:var(--accent2);color:#fff;}

/* search */
.sb-search{padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;}
.sw{position:relative;}
.si-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
.sinput{width:100%;padding:7px 10px 7px 32px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--font-ui);font-size:13px;transition:border var(--t);}
.sinput:focus{outline:none;border-color:var(--accent);}
.sres{position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);z-index:300;max-height:280px;overflow-y:auto;box-shadow:var(--sh2);display:none;}
.sres.on{display:block;}
.sri{padding:8px 12px;font-size:12px;font-family:var(--font-ui);cursor:pointer;border-bottom:1px solid var(--border);color:var(--text2);line-height:1.6;transition:background var(--t);}
.sri:last-child{border-bottom:none;}
.sri:hover{background:var(--accent-light);color:var(--accent);}
.sri-t{font-weight:600;color:var(--text);font-size:11.5px;margin-bottom:2px;}
mark{background:var(--hl-y);color:inherit;border-radius:2px;padding:0 1px;}

/* ── Multi-doc panel inside sidebar ── */
/* Each imported doc gets a collapsible section header + its TOC items */
.sb-doclist{flex:1;overflow-y:auto;padding:0;}
.sb-doclist::-webkit-scrollbar{width:3px;}
.sb-doclist::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* Doc section (one per imported file) */
.doc-sec{border-bottom:1px solid var(--border);}
.doc-sec-hd{
  display:flex;align-items:center;gap:0;padding:0;
  background:var(--surface2);cursor:pointer;
  transition:background var(--t);user-select:none;flex-shrink:0;
  border-left:3px solid transparent;
}
.doc-sec-hd:hover{background:var(--accent-light);}
.doc-sec-hd.active-doc{border-left-color:var(--accent);background:var(--accent-light);}
.doc-sec-arr{width:22px;height:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text3);font-size:9px;transition:transform .2s;}
.doc-sec.coll .doc-sec-arr{transform:rotate(-90deg);}
.doc-sec-info{flex:1;padding:9px 10px 9px 0;overflow:hidden;min-width:0;}
.doc-sec-name{font-family:var(--font-ui);font-size:12.5px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.doc-sec-meta{font-family:var(--font-ui);font-size:10.5px;color:var(--text3);margin-top:1px;}
.doc-sec-x{width:26px;height:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text3);font-size:12px;transition:all var(--t);border-radius:4px;}
.doc-sec-x:hover{color:#c0392b;background:rgba(192,57,43,.1);}

/* TOC inside doc section */
.doc-toc{overflow:hidden;transition:max-height .25s ease;}
.doc-sec.coll .doc-toc{max-height:0!important;}

/* toc structure entries */
.toc-group{overflow:visible;}
.tg-hd{display:flex;align-items:stretch;cursor:pointer;border-left:2px solid transparent;transition:all var(--t);user-select:none;}
.tg-hd:hover{background:var(--accent-light);}
.tg-hd.toc-active{border-left-color:var(--accent);background:var(--accent-light);}
.tg-arr{width:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text3);font-size:9px;transition:transform .2s;}
.toc-group.coll .tg-arr{transform:rotate(-90deg);}
.tg-bd{overflow:hidden;transition:max-height .22s ease;}
.toc-group.coll .tg-bd{max-height:0!important;}

.ti{padding:5px 12px;cursor:pointer;font-family:var(--font-ui);font-size:12px;color:var(--text2);transition:all var(--t);display:flex;align-items:center;gap:6px;border-left:2px solid transparent;line-height:1.4;}
.ti:hover{color:var(--accent);background:var(--accent-light);}
.ti.toc-active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-light);font-weight:500;}
.tl1{padding-left:6px;font-weight:700;font-size:12.5px;}
.tl2{padding-left:16px;font-weight:600;font-size:12px;}
.tl3{padding-left:26px;font-size:12px;}
.tl4{padding-left:38px;font-size:11.5px;color:var(--text3);}
.tn{color:var(--accent);font-family:var(--font-mono);font-size:10px;flex-shrink:0;}
.tbadge{font-size:9.5px;font-family:var(--font-mono);background:var(--accent-light);color:var(--accent);border-radius:10px;padding:1px 6px;flex-shrink:0;}
.tg-inner{flex:1;display:flex;align-items:center;gap:8px;padding:7px 10px 7px 0;overflow:hidden;}
.tg-l1 .tg-inner{font-size:12.5px;font-weight:700;color:var(--text);}
.tg-l2 .tg-inner{font-size:12px;font-weight:600;color:var(--text);}
.tg-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}

/* bookmark panel */
.bm-panel{border-top:1px solid var(--border);padding:8px 12px;flex-shrink:0;max-height:180px;display:none;flex-direction:column;}
.bm-panel.on{display:flex;}
.bm-title{font-size:10.5px;font-weight:600;color:var(--text3);letter-spacing:.09em;text-transform:uppercase;font-family:var(--font-ui);margin-bottom:6px;flex-shrink:0;}
.bm-list{overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
.bm-item{padding:4px 8px;border-radius:5px;font-size:12px;font-family:var(--font-ui);cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:6px;transition:all var(--t);}
.bm-item:hover{background:var(--accent-light);color:var(--accent);}
.bm-del{margin-left:auto;font-size:13px;opacity:.4;transition:opacity var(--t);flex-shrink:0;padding:0 2px;}
.bm-del:hover{opacity:1;color:#c0392b;}
.bm-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ═══════════════════════ MAIN ═══════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.prog{height:2px;background:var(--border);flex-shrink:0;}
.prog-f{height:100%;background:var(--accent);width:0%;transition:width .4s ease;}

/* ── Toolbar ── */
.tb{display:flex;align-items:center;gap:3px;padding:5px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;min-height:46px;overflow-x:auto;scrollbar-width:none;}
.tb::-webkit-scrollbar{display:none;}
.tb-sep{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0;}
.sb-tog{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;color:var(--text2);transition:all var(--t);flex-shrink:0;}
.sb-tog:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.tbtn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid transparent;background:transparent;cursor:pointer;color:var(--text2);transition:all var(--t);flex-shrink:0;font-size:13px;font-weight:600;font-family:var(--font-ui);position:relative;}
.tbtn:hover{background:var(--bg2);border-color:var(--border);color:var(--text);}
.tbtn.on{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.tbtn[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--text);font-family:var(--font-ui);font-size:11px;padding:2px 8px;border-radius:4px;white-space:nowrap;z-index:9999;border:1px solid var(--border);pointer-events:none;font-weight:400;}
.tsel{padding:4px 6px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font-ui);font-size:12px;cursor:pointer;max-width:96px;flex-shrink:0;}
.cdot{width:17px;height:17px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:all var(--t);flex-shrink:0;}
.cdot:hover,.cdot.active{border-color:var(--accent);transform:scale(1.2);}
/* font-color button */
.fc-wrap{position:relative;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid transparent;cursor:pointer;flex-shrink:0;transition:all var(--t);}
.fc-wrap:hover{background:var(--bg2);border-color:var(--border);}
.fc-bar{position:absolute;bottom:4px;left:4px;right:4px;height:3px;border-radius:2px;background:#e53935;}
.fc-wrap input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}

/* ── Reading Area ── */
.ra{flex:1;overflow-y:auto;scroll-behavior:smooth;}
.ra::-webkit-scrollbar{width:6px;}
.ra::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.ra-inner{padding:48px max(24px,calc((100% - var(--cw))/2));}

/* ── Welcome screen ── */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;gap:20px;padding:32px;}
.w-icon{font-size:52px;opacity:.25;line-height:1;}
.w-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:.06em;}
.w-desc{font-size:13px;color:var(--text3);font-family:var(--font-ui);max-width:360px;line-height:1.9;}
.dropzone{border:2px dashed var(--border2);border-radius:16px;padding:30px 50px;cursor:pointer;transition:all var(--t);background:var(--surface2);}
.dropzone:hover,.dropzone.drag{border-color:var(--accent);background:var(--accent-light);}
.dz-text{font-size:13px;color:var(--text2);font-family:var(--font-ui);margin-top:10px;}
.dz-fmt{font-size:11px;color:var(--text3);font-family:var(--font-mono);margin-top:4px;}

/* ═══════════════════════ DOCUMENT CONTENT ═══════════════════════ */
.doc{display:none;max-width:var(--cw);margin:0 auto;animation:fi .3s ease;}
.doc.active{display:block;}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.doc-hdr{text-align:center;margin-bottom:40px;padding-bottom:24px;border-bottom:2px solid var(--border);}
.doc-title{font-size:21px;font-weight:700;color:var(--text);letter-spacing:.09em;line-height:1.5;margin-bottom:6px;}
.doc-meta{font-size:12px;color:var(--text3);font-family:var(--font-ui);}

/* 编 */
.lp{margin:48px 0 0;padding:24px 0 20px;text-align:center;}
.lp::before,.lp::after{content:'';display:block;height:1px;background:linear-gradient(90deg,transparent,var(--border2) 40%,var(--border2) 60%,transparent);}
.lp::before{margin-bottom:20px;}
.lp::after{margin-top:20px;}
.lp-ey{font-size:10.5px;font-family:var(--font-ui);font-weight:700;color:var(--accent);letter-spacing:.22em;text-transform:uppercase;margin-bottom:8px;}
.lp-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:.1em;}
.lp-orn{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;}
.lp-orn span{display:inline-block;width:22px;height:1px;background:var(--accent);opacity:.5;}
.lp-orn i{font-style:normal;color:var(--accent);font-size:11px;opacity:.7;}

/* 章 */
.lz{margin:34px 0 0;padding:16px 0 12px;position:relative;}
.lz::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:36px;height:2px;background:var(--accent2);border-radius:1px;opacity:.55;}
.lz-inner{display:flex;flex-direction:column;align-items:center;gap:5px;}
.lz-ey{font-size:10px;font-family:var(--font-ui);font-weight:700;color:var(--accent2);letter-spacing:.18em;}
.lz-title{font-size:16.5px;font-weight:600;color:var(--text);letter-spacing:.07em;}
.lz-rule{width:100%;height:1px;margin-top:12px;background:linear-gradient(90deg,transparent,var(--border) 30%,var(--border) 70%,transparent);}

/* 节 */
.ljie{margin:20px 0 4px;padding:9px 14px 8px;border-left:3px solid var(--accent2);background:linear-gradient(to right,var(--accent-light),transparent 70%);border-radius:0 var(--r) var(--r) 0;}
.ljie-ey{font-size:10px;font-family:var(--font-ui);font-weight:600;color:var(--accent2);letter-spacing:.12em;margin-bottom:2px;}
.ljie-title{font-size:14px;font-weight:600;color:var(--text);}

/* 条 */
.lt{margin-bottom:0;padding:12px 4px 12px 20px;border-bottom:1px solid var(--border);position:relative;scroll-margin-top:24px;transition:background .15s;}
.lt:last-of-type{border-bottom:none;}
.lt:hover{background:linear-gradient(to right,var(--accent-light) 0%,transparent 85%);}

/* bookmark flag on tiao */
.lt-bm-flag{position:absolute;left:3px;top:13px;width:14px;display:none;align-items:center;justify-content:center;color:var(--accent);font-size:13px;opacity:.85;cursor:pointer;}
.lt[data-bm=true] .lt-bm-flag{display:flex;}

/* The editable content body of each 条 */
.lt-body{outline:none;caret-color:var(--accent);word-break:break-all;}

.lt-num{font-weight:700;color:var(--accent);font-size:14px;font-family:var(--font-ui);letter-spacing:.04em;display:inline;margin-right:5px;user-select:none;}
.lt-txt{letter-spacing:var(--ls);line-height:var(--lh);color:var(--text);}
.lt-kuan{text-indent:var(--indent);letter-spacing:var(--ls);line-height:var(--lh);color:var(--text);margin-top:4px;}
.lt-xiang{text-indent:calc(var(--indent)*1.5);letter-spacing:var(--ls);line-height:var(--lh);color:var(--text2);font-size:.96em;margin-top:3px;}

/* copy btn */
.lt-cp{opacity:0;position:absolute;right:4px;top:13px;width:24px;height:24px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:11px;transition:all var(--t);}
.lt:hover .lt-cp{opacity:1;}
.lt-cp:hover{background:var(--accent);border-color:var(--accent);color:#fff;}

/* note */
.lt-note{display:inline-flex;align-items:flex-start;gap:6px;margin-top:10px;background:var(--hl-y);border-radius:6px;padding:7px 11px;font-size:12px;font-family:var(--font-ui);color:#38300a;box-shadow:var(--sh);line-height:1.6;max-width:100%;cursor:pointer;}
.lt-note:hover{opacity:.85;}
[data-theme=dark] .lt-note,[data-theme=night] .lt-note{color:#ccc070;}
[data-theme=sepia] .lt-note{color:#3a2e10;}

/* highlights */
.hl{border-radius:3px;padding:0 1px;}
.hl-y{background:var(--hl-y);}
.hl-g{background:var(--hl-g);}
.hl-b{background:var(--hl-b);}
.hl-p{background:var(--hl-p);}
.hl-u{border-bottom:2.5px solid var(--accent);}

.doc-foot{display:flex;gap:14px;padding:8px 0;border-top:1px solid var(--border);margin-top:36px;font-size:12px;color:var(--text3);font-family:var(--font-ui);justify-content:center;}

/* ═══ INLINE FLOATING FORMAT BAR (appears near selection) ═══ */
/* This replaces the old cmenu — it's a compact horizontal bar with real format controls */
.fbar{
  position:fixed;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  box-shadow:var(--sh2);
  display:none;
  align-items:center;
  gap:1px;
  padding:4px;
  z-index:9000;
  pointer-events:all;
  user-select:none;
  /* prevent bar from stealing focus from the selection */
}
.fbar.on{display:flex;}
.fbar-sep{width:1px;height:18px;background:var(--border);margin:0 2px;flex-shrink:0;}
/* fbar buttons: identical style to toolbar .tbtn but smaller */
.fb{
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:6px;border:none;background:transparent;
  cursor:pointer;color:var(--text2);transition:all var(--t);flex-shrink:0;
  font-size:13px;font-weight:700;font-family:var(--font-ui);
  position:relative;
}
.fb:hover{background:var(--accent-light);color:var(--accent);}
.fb svg{pointer-events:none;}
/* hl dots in fbar */
.fb-hl{width:16px;height:16px;border-radius:50%;display:inline-block;border:2px solid rgba(0,0,0,.15);flex-shrink:0;cursor:pointer;}
/* color input inside fbar */
.fb-fc{position:relative;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;transition:all var(--t);}
.fb-fc:hover{background:var(--accent-light);}
.fb-fc-bar{position:absolute;bottom:4px;left:4px;right:4px;height:3px;border-radius:2px;}
.fb-fc input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
/* "more" section: copy + note */
.fb-copy,.fb-note{font-size:12px;font-family:var(--font-ui);padding:0 6px;height:28px;display:flex;align-items:center;cursor:pointer;border-radius:6px;color:var(--text2);transition:all var(--t);white-space:nowrap;gap:4px;}
.fb-copy:hover,.fb-note:hover{background:var(--accent-light);color:var(--accent);}

/* ── Dialogs ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1998;display:none;backdrop-filter:blur(3px);}
.overlay.on{display:block;}
.dialog{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;z-index:1999;width:340px;box-shadow:var(--sh2);display:none;}
.dialog.on{display:block;}
.dlg-title{font-size:14px;font-weight:600;font-family:var(--font-ui);margin-bottom:12px;color:var(--text);}
.dialog textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-family:var(--font-body);font-size:14px;resize:vertical;min-height:88px;line-height:1.7;}
.dialog textarea:focus{outline:none;border-color:var(--accent);}
.dlg-acts{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;}

/* ── Settings panel ── */
.spanel{position:fixed;top:0;right:-380px;width:368px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:400;overflow-y:auto;transition:right .28s ease;box-shadow:-4px 0 28px rgba(0,0,0,.12);}
.spanel.on{right:0;}
.spanel::-webkit-scrollbar{width:4px;}
.spanel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.sp-hd{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}
.sp-title{font-size:15px;font-weight:600;}
.sp-body{padding:16px 20px;display:flex;flex-direction:column;gap:20px;}
.sg{display:flex;flex-direction:column;gap:10px;}
.slabel{font-size:10.5px;font-weight:600;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;font-family:var(--font-ui);}
.tgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
.tsw{padding:9px;border-radius:var(--r);border:2px solid var(--border);cursor:pointer;font-family:var(--font-ui);font-size:12px;text-align:center;transition:all var(--t);font-weight:500;}
.tsw:hover,.tsw.active{border-color:var(--accent);}
.tsw[data-t=light]{background:#f7f3ec;color:#26190e;}
.tsw[data-t=dark]{background:#18160f;color:#e8dfc8;}
.tsw[data-t=sepia]{background:#f3ecdc;color:#362510;}
.tsw[data-t=night]{background:#0c0e14;color:#c0d0e8;}
.rr{display:flex;align-items:center;gap:10px;}
.rl{color:var(--text2);min-width:58px;font-size:12px;font-family:var(--font-ui);}
input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;}
.rv{min-width:36px;text-align:right;color:var(--text3);font-size:12px;font-family:var(--font-mono);}
.fgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.fbtn{padding:8px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;text-align:center;transition:all var(--t);color:var(--text);background:transparent;}
.fbtn:hover,.fbtn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}

/* ── Export menu ── */
.emenu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--sh2);z-index:600;display:none;flex-direction:column;min-width:175px;overflow:hidden;}
.emenu.on{display:flex;}
.ei{padding:10px 15px;font-family:var(--font-ui);font-size:13px;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:9px;transition:background var(--t);}
.ei:hover{background:var(--accent-light);color:var(--accent);}

/* ── Quick nav ── */
.qnav{position:fixed;bottom:56px;right:18px;display:flex;flex-direction:column;gap:5px;z-index:50;}
.qb{width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);box-shadow:var(--sh);transition:all var(--t);font-size:14px;}
.qb:hover{background:var(--accent);border-color:var(--accent);color:#fff;}

/* Loading */
.lmask{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:3000;flex-direction:column;gap:16px;}
.lmask.on{display:flex;}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.ltxt{font-family:var(--font-ui);font-size:13px;color:var(--text3);}

/* mobile */
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:15;}

/* ── Print ── */
@media print{
  body{overflow:visible;height:auto;background:#fff!important;color:#000!important;font-size:11pt;}
  .app{display:block;height:auto;overflow:visible;}
  .sidebar,.tb,.prog,.qnav,.lmask,.spanel,.fbar,.dialog,.overlay,.emenu,.sb-ov,.lt-cp,.doc-foot{display:none!important;}
  .main{display:block;overflow:visible;}
  .ra{overflow:visible;display:block;height:auto;}
  .ra-inner{padding:0;}
  .doc{display:none!important;max-width:none;}
  .doc.print-t{display:block!important;}
  .lt{break-inside:avoid;page-break-inside:avoid;border-bottom:1px solid #ddd;}
  .lp{break-before:page;page-break-before:always;}
  .lp:first-of-type{break-before:auto;}
  .lt-num{color:#5a0000!important;}
  .hl-y{background:#fff3a3!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .hl-g{background:#b8f0c8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .hl-b{background:#b8d8f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .hl-p{background:#f0b8d0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .hl-u{border-bottom:2px solid #7c3a12!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .lt-note{background:#fff3a3!important;color:#38300a!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  @page{margin:2cm;size:A4;}
}

/* ── Responsive ── */
@media(max-width:768px){
  :root{--sidebar-w:280px;}
  .sidebar{position:fixed;top:0;left:0;height:100vh;transform:translateX(-100%);z-index:100;width:var(--sidebar-w)!important;min-width:var(--sidebar-w)!important;}
  .sidebar.mobile-on{transform:translateX(0);}
  .sidebar.collapsed{transform:translateX(-100%)!important;}
  .sb-ov.on{display:block;}
  .ra-inner{padding:24px 16px;}
  .spanel{width:100%;right:-100%;}
  .dialog{width:calc(100vw - 28px);}
  .tbtn[data-tip]:hover::after{display:none;}
}
</style>

const esc=s=>(!s?'':(s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));

let docs={}, activeId=null, noteTarget=null, isMob=innerWidth<=768;

/* ═══ File loading ═══ */
G('fInput').addEventListener('change',e=>loadFiles(e.target.files));
const dz=G('dz');
dz.addEventListener('click',()=>G('fInput').click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');loadFiles(e.dataTransfer.files);});

ra.addEventListener('drop',e=>{e.preventDefault();loadFiles(e.dataTransfer.files);});

async function loadFiles(files){for(const f of files)await loadFile(f);}

async function loadFile(file){
  showLoad(true,'解析中：'+file.name);
  try{
    const ext=file.name.split('.').pop().toLowerCase();
    let text='';
    if(ext==='pdf') text=await extractPDF(file);
    else if(ext==='docx') text=await extractDocx(file);
    else if(ext==='doc') text=await extractDoc(file);
    else if(ext==='txt'||ext==='tex') text=await file.text();
    else{alert('不支持的格式: '+ext);showLoad(false);return;}
    const id='d'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
    const title=file.name.replace(/\.[^/.]+$/,'');
    docs[id]={title,raw:text,parsed:parseLaw(text,title),notes:{},bookmarks:[]};
    addDocUI(id);
    swDoc(id);
    G('welcome').style.display='none';
  }catch(e){console.error(e);alert('解析失败: '+e.message);}
  showLoad(false);
}

/* ══════════════════════════════════════════════════════════════
   PDF EXTRACTION — line-joining aware of Chinese law structure
   ══════════════════════════════════════════════════════════════
   Strategy:
   1. Extract all text items per page with their x/y coordinates.
   2. Group items into visual rows (same Y ± tolerance).
   3. Join items within each row (handle spacing gaps).
   4. Collect raw visual lines.
   5. POST-PROCESS: merge continuation lines into their paragraph.
      A line is a "continuation" if it does NOT start with a
      structural keyword (第X编/章/节/条) and the previous line
      does NOT end with a sentence-final punctuation (。！？…).
      Continuation lines are joined (no newline) to the previous line.
   ══════════════════════════════════════════════════════════════ */
async function extractPDF(file){
  const ab=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:ab}).promise;

  /* Structural-start patterns – lines beginning with these are NEVER merged upward */
  const STRUCT_RE=/^[\s　]*(第[一二三四五六七八九十百千零〇\d]+[编章节条]|（[一二三四五六七八九十\d]+）|[一二三四五六七八九十\d]+[、．])/;
  const SENT_END=/[。！？…」』]\s*$/;

  const rawLines=[];

  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const ct=await page.getTextContent({normalizeWhitespace:false,disableCombineTextItems:false});
    const vp=page.getViewport({scale:1});
    const H=vp.height;

    /* collect items */
    const items=ct.items
      .filter(it=>it.str&&it.str.trim())
      .map(it=>({
        y:Math.round((H-it.transform[5])*2)/2, // bucket to 0.5pt
        x:it.transform[4],
        str:it.str,
        w:it.width||0
      }));

    /* group into rows by Y */
    const rows=[];
    for(const it of items){
      let row=rows.find(r=>Math.abs(r.y-it.y)<5);
      if(!row){row={y:it.y,items:[]};rows.push(row);}
      row.items.push(it);
    }
    rows.sort((a,b)=>a.y-b.y);

    /* join each row into a string */
    for(const row of rows){
      row.items.sort((a,b)=>a.x-b.x);
      let line='';let prevEnd=null;
      for(const it of row.items){
        if(prevEnd!==null){
          const gap=it.x-prevEnd;
          // Chinese chars ~10-12pt wide; gap > 8pt = intentional space
          if(gap>8&&!line.endsWith(' ')) line+=' ';
        }
        line+=it.str;
        prevEnd=it.x+it.w;
      }
      line=line.trim();
      // Remove common PDF number-repeat artifacts like "1 1" page numbers
      line=line.replace(/^(\d+)\s+\1$/, '');
      if(line) rawLines.push(line);
    }
    rawLines.push('__PAGE__');
  }

  /* ── Post-process: merge continuation lines ── */
  const merged=[];
  for(let i=0;i<rawLines.length;i++){
    const line=rawLines[i];
    if(line==='__PAGE__'){merged.push('');continue;}

    /* always start a new paragraph for structural lines */
    if(STRUCT_RE.test(line)){merged.push(line);continue;}

    /* if previous non-empty logical line ended with sentence-final punct,
       this is a new paragraph */
    const prev=merged[merged.length-1];
    if(!prev||prev===''||SENT_END.test(prev)){
      merged.push(line);
    } else {
      /* continuation: join to previous line without adding newline */
      merged[merged.length-1]+=line;
    }
  }

  /* ── Clean up ── */
  let text=merged.join('\n');
  text=text.replace(/([。，、；：！？])\1+/g,'$1');  // repeated punct
  text=text.replace(/\n{3,}/g,'\n\n');               // excess blanks
  text=text.replace(/ +/g,' ');                       // multi-spaces
  return text;
}

async function extractDocx(file){const ab=await file.arrayBuffer();return(await mammoth.extractRawText({arrayBuffer:ab})).value;}
async function extractDoc(file){try{return await extractDocx(file);}catch{return await file.text();}}

/* ═══ Parser ═══ */
function parseLaw(text,defaultTitle){
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\n{3,}/g,'\n\n');
  const RE={
    kw:/(?:法|条例|规定|办法|规则|章程|决定|通知|制度|暂行|实施|管理|保护|促进)/,
    pian:/^[\s　]*(第[一二三四五六七八九十百千零〇\d]+编)\s*(.*)?$/,
    zhang:/^[\s　]*(第[一二三四五六七八九十百千零〇\d]+章)\s*(.*)?$/,
    jie:/^[\s　]*(第[一二三四五六七八九十百千零〇\d]+节)\s*(.*)?$/,
    tiao:/^[\s　]*(第[一二三四五六七八九十百千零〇\d]+条)\s*([\s\S]*)?$/,
    xiang:/^[\s　]*[（(][一二三四五六七八九十百\d]+[）)]\s*/,
    xiang2:/^[\s　]*[一二三四五六七八九十百\d]+[、．.]\s+\S/,
  };
  const lines=text.split('\n');
  let blocks=[],curr=null,ac=0,sc=0,titleFound=false,docTitle=defaultTitle;
  for(let i=0;i<lines.length;i++){
    const line=lines[i].trim();
    if(!line) continue;
    if(!titleFound&&i<25&&line.length<=60&&RE.kw.test(line)&&!RE.tiao.test(line)&&!RE.pian.test(line)&&!RE.zhang.test(line)){
      docTitle=line;titleFound=true;blocks.push({type:'title',text:line});continue;
    }
    const mp=line.match(RE.pian),mz=line.match(RE.zhang),mj=line.match(RE.jie),mt=line.match(RE.tiao);
    if(mp){curr=null;sc++;blocks.push({type:'pian',num:mp[1],title:(mp[2]||'').trim(),id:'pian-'+sc});}
    else if(mz){curr=null;sc++;blocks.push({type:'zhang',num:mz[1],title:(mz[2]||'').trim(),id:'zhang-'+sc});}
    else if(mj){curr=null;blocks.push({type:'jie',num:mj[1],title:(mj[2]||'').trim()});}
    else if(mt){ac++;curr={type:'tiao',num:mt[1],content:(mt[2]||'').trim(),kuan:[],id:'tiao-'+ac,n:ac};blocks.push(curr);}
    else if(curr){const isX=RE.xiang.test(line)||RE.xiang2.test(line);curr.kuan.push({type:isX?'xiang':'kuan',text:line});}
    else blocks.push({type:'text',text:line});
  }
  /* remove duplicate struct headings before first tiao */
  const fi=blocks.findIndex(b=>b.type==='tiao');
  if(fi>0){
    const body=blocks.slice(fi);
    blocks=blocks.filter((b,i)=>{
      if(i>=fi)return true;
      if(b.type==='title')return true;
      if(b.type==='text')return false;
      return !body.some(b2=>b2.type===b.type&&b2.num===b.num);
    });
  }
  return{title:docTitle,blocks,ac};
}

/* ═══ Render ═══ */
function renderDoc(id){
  G('doc-'+id)?.remove();
  const doc=docs[id],p=doc.parsed;
  const wrap=document.createElement('div');wrap.className='doc';wrap.id='doc-'+id;
  const hdr=document.createElement('div');hdr.className='doc-hdr';
  hdr.innerHTML=`<div class="doc-title">${esc(p.title)}</div><div class="doc-meta">共 ${p.ac} 条</div>`;
  wrap.appendChild(hdr);

  for(const b of p.blocks){
    if(b.type==='title') continue;
    if(b.type==='pian'){
      const el=document.createElement('div');el.className='lp';el.id=b.id;
      el.innerHTML=`<div class="lp-ey">${esc(b.num)}</div><div class="lp-title">${esc(b.title||b.num)}</div><div class="lp-orn"><span></span><i>◆</i><span></span></div>`;
      wrap.appendChild(el);
    }else if(b.type==='zhang'){
      const el=document.createElement('div');el.className='lz';el.id=b.id;
      el.innerHTML=`<div class="lz-inner"><div class="lz-ey">${esc(b.num)}</div><div class="lz-title">${esc(b.title||b.num)}</div></div><div class="lz-rule"></div>`;
      wrap.appendChild(el);
    }else if(b.type==='jie'){
      const el=document.createElement('div');el.className='ljie';
      el.innerHTML=`<div class="ljie-ey">${esc(b.num)}</div><div class="ljie-title">${esc(b.title)}</div>`;
      wrap.appendChild(el);
    }else if(b.type==='tiao'){
      const el=document.createElement('div');el.className='lt';el.id=b.id;el.setAttribute('data-n',b.n);
      if(doc.bookmarks.some(bm=>bm.id===b.id)) el.setAttribute('data-bm','true');
      const flag=document.createElement('div');flag.className='lt-bm-flag';flag.textContent='🔖';
      flag.title='点击删除书签';flag.onclick=e=>{e.stopPropagation();removeBM(id,b.id);};
      const body=document.createElement('div');body.className='lt-body';
      body.contentEditable='true';body.spellcheck=false;body.style.outline='none';
      let html=`<span class="lt-num" contenteditable="false">${esc(b.num)}</span><span class="lt-txt">${esc(b.content)}</span>`;
      for(const k of b.kuan) html+=`<div class="${k.type==='xiang'?'lt-xiang':'lt-kuan'}">${esc(k.text)}</div>`;
      if(doc.notes[b.id]) html+=noteHTML(doc.notes[b.id]);
      body.innerHTML=html;
      const cp=document.createElement('button');cp.className='lt-cp';cp.textContent='⧉';
      cp.contentEditable='false';cp.title='复制本条';
      cp.onclick=e=>{e.stopPropagation();copyTiao(el);};
      el.appendChild(flag);el.appendChild(body);el.appendChild(cp);
      wrap.appendChild(el);
    }else if(b.type==='text'){
      const el=document.createElement('p');
      el.style.cssText='color:var(--text2);font-size:.95em;margin:6px 0;line-height:var(--lh)';
      el.textContent=b.text;wrap.appendChild(el);
    }
  }
  const foot=document.createElement('div');foot.className='doc-foot';
  foot.innerHTML=`<span>📄 ${esc(p.title)}</span><span>⚖ ${p.ac} 条</span>`;
  wrap.appendChild(foot);
  raI.appendChild(wrap);
}
function noteHTML(text){return`<div class="lt-note" contenteditable="false" onclick="editNote(this)" title="点击编辑批注">📝 <span>${esc(text)}</span></div>`;}

/* ═══ Multi-doc sidebar ═══
   Each doc gets a collapsible section in sbDoclist that contains:
   [▾] [doc title] [×]
       └── TOC items (章 / 编 groups → 条 items)
   Active doc section stays expanded; others collapse.
════════════════════════════════════════════════════════ */
function addDocUI(id){
  const doc=docs[id];
  G('tocEmpty')&&(G('tocEmpty').style.display='none');

  /* ── sidebar section ── */
  const sec=document.createElement('div');sec.className='doc-sec';sec.id='sec-'+id;

  const hd=document.createElement('div');hd.className='doc-sec-hd';hd.id='sechd-'+id;

  const arr=document.createElement('span');arr.className='doc-sec-arr';arr.textContent='▾';
  arr.onclick=e=>{e.stopPropagation();toggleSecColl(id);};

  const info=document.createElement('div');info.className='doc-sec-info';
  info.innerHTML=`<div class="doc-sec-name">${esc(doc.title)}</div><div class="doc-sec-meta">${doc.parsed.ac}条</div>`;
  info.onclick=()=>swDoc(id);

  const x=document.createElement('div');x.className='doc-sec-x';x.textContent='×';
  x.title='关闭文件';x.onclick=e=>{e.stopPropagation();closeDoc(id);};

  hd.appendChild(arr);hd.appendChild(info);hd.appendChild(x);

  /* ── toc body ── */
  const tocDiv=document.createElement('div');tocDiv.className='doc-toc';tocDiv.id='toc-'+id;
  tocDiv.style.maxHeight='9999px';
  buildTOC(id,tocDiv);

  sec.appendChild(hd);sec.appendChild(tocDiv);
  sbDoclist.appendChild(sec);

  /* render reading area doc */
  renderDoc(id);
}

function toggleSecColl(id){
  const sec=G('sec-'+id);const toc=G('toc-'+id);const arr=Q('.doc-sec-arr',sec);
  const coll=sec.classList.toggle('coll');
  if(!coll){toc.style.maxHeight=toc.scrollHeight+'px';setTimeout(()=>toc.style.maxHeight='9999px',250);}
  else{toc.style.maxHeight=toc.scrollHeight+'px';requestAnimationFrame(()=>toc.style.maxHeight='0');}
}

function buildTOC(id,container){
  container.innerHTML='';
  const doc=docs[id],b=doc.parsed.blocks;
  const frag=document.createDocumentFragment();
  let pianG=null,zhangG=null;
  const getCont=()=>zhangG?.bd||pianG?.bd||frag;

  for(const blk of b){
    if(blk.type==='title') continue;
    if(blk.type==='pian'){
      zhangG=null;
      const g=mkTocGrp('tg-l1',blk,id);frag.appendChild(g.el);pianG=g;
    }else if(blk.type==='zhang'){
      zhangG=null;
      const par=pianG?pianG.bd:frag;
      const g=mkTocGrp('tg-l2',blk,id);par.appendChild(g.el);zhangG=g;
    }else if(blk.type==='jie'){
      const c=getCont();
      const it=mkTI('ti tl3',id);it.setAttribute('data-tgt',blk.id);
      it.innerHTML=`<span class="tn">${esc(blk.num)}</span><span>${esc(blk.title)}</span>`;
      it.onclick=()=>{swDoc(id);scrollID(blk.id);if(isMob)closeMobSB();};
      c.appendChild(it);
    }else if(blk.type==='tiao'){
      const c=getCont();
      const it=mkTI('ti tl4',id);it.setAttribute('data-tgt',blk.id);
      const prev=blk.content?blk.content.slice(0,14)+(blk.content.length>14?'…':''):'';
      it.innerHTML=`<span class="tn">${esc(blk.num)}</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${esc(prev)}</span>`;
      it.onclick=()=>{swDoc(id);scrollID(blk.id);deactivateTOC();it.classList.add('toc-active');if(isMob)closeMobSB();};
      c.appendChild(it);
    }
  }
  container.appendChild(frag);
}

function mkTI(cls,id){const el=document.createElement('div');el.className=cls;el.setAttribute('data-doc',id);return el;}

function mkTocGrp(lvlCls,blk,id){
  const group=document.createElement('div');group.className='toc-group';group.setAttribute('data-doc',id);
  const hd=document.createElement('div');hd.className='tg-hd '+lvlCls;hd.setAttribute('data-doc',id);
  const arr=document.createElement('span');arr.className='tg-arr';arr.innerHTML='▾';
  const inner=document.createElement('div');inner.className='tg-inner';
  inner.innerHTML=`<span>${esc(blk.num)}</span>${blk.title?`<span class="tg-label" style="color:var(--text2);font-weight:400;font-size:11px">${esc(blk.title)}</span>`:''}`;
  hd.appendChild(arr);hd.appendChild(inner);
  const bd=document.createElement('div');bd.className='tg-bd';bd.style.maxHeight='9999px';
  arr.onclick=e=>{
    e.stopPropagation();
    const coll=group.classList.toggle('coll');
    if(!coll){bd.style.maxHeight=bd.scrollHeight+'px';setTimeout(()=>bd.style.maxHeight='9999px',240);}
    else{bd.style.maxHeight=bd.scrollHeight+'px';requestAnimationFrame(()=>bd.style.maxHeight='0');}
  };
  inner.onclick=()=>{swDoc(id);scrollID(blk.id);if(isMob)closeMobSB();};
  group.appendChild(hd);group.appendChild(bd);
  return{el:group,bd,hd};
}

function scrollID(id){const el=G(id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
function deactivateTOC(){QA('.ti.toc-active').forEach(el=>el.classList.remove('toc-active'));}

function swDoc(id){
  activeId=id;
  /* reading area */
  QA('.doc').forEach(c=>c.classList.toggle('active',c.id==='doc-'+id));
  /* sidebar sections: mark active, expand active, leave others as they are */
  QA('.doc-sec').forEach(sec=>{
    const sid=sec.id.replace('sec-','');
    const hd=Q('.doc-sec-hd',sec);
    if(hd) hd.classList.toggle('active-doc',sid===id);
    /* auto-expand the newly active doc's toc if collapsed */
    if(sid===id&&sec.classList.contains('coll')) toggleSecColl(id);
  });
  refreshBMPanel();
}

function closeDoc(id){
  delete docs[id];
  G('doc-'+id)?.remove();
  G('sec-'+id)?.remove();
  const rem=Object.keys(docs);
  if(rem.length){swDoc(rem[rem.length-1]);}
  else{activeId=null;G('welcome').style.display='';G('tocEmpty').style.display='';}
}

/* ═══ IntersectionObserver: sync TOC with scroll ═══ */
const iObs=new IntersectionObserver(entries=>{
  for(const en of entries){
    if(!en.isIntersecting) continue;
    const id=en.target.id;
    /* find matching toc item across all doc tocs */
    const it=Q(`.ti[data-tgt="${id}"]`,sbDoclist);
    if(it){deactivateTOC();it.classList.add('toc-active');}
  }
},{root:ra,threshold:0.1,rootMargin:'-5% 0px -72% 0px'});
new MutationObserver(()=>{
  QA('.lt[id],.lp[id],.lz[id]').forEach(el=>iObs.observe(el));
}).observe(raI,{childList:true,subtree:true});

/* ═══ Reading progress ═══ */
ra.addEventListener('scroll',()=>{const t=ra.scrollHeight-ra.clientHeight;progF.style.width=(t>0?ra.scrollTop/t*100:0)+'%';});

/* ════════════════════════════════════════════════════════════
   FORMATTING — toolbar + floating bar
   KEY INSIGHT: contenteditable loses selection when you click
   a button outside of it. Solution: use onmousedown + preventDefault
   on the floating bar, and save/restore range for toolbar.
════════════════════════════════════════════════════════════ */

let savedRange=null;

function saveRange(){
  const sel=window.getSelection();
  if(sel&&sel.rangeCount>0){const r=sel.getRangeAt(0);if(!r.collapsed)savedRange=r.cloneRange();}
}
function restoreRange(){
  if(!savedRange)return false;
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(savedRange);
  return true;
}

/* Check if a range is inside an lt-body */
function rangeInBody(range){
  if(!range)return false;
  let n=range.commonAncestorContainer;if(n.nodeType===3)n=n.parentNode;
  return !!(n&&n.closest&&n.closest('.lt-body'));
}

/* ── TOOLBAR buttons (selection may be lost when button gets focus) ── */
function tbFmt(cmd){
  if(!restoreRange())return;
  if(!rangeInBody(savedRange))return;
  document.execCommand(cmd,false,null);
  savedRange=null;
}
function tbHL(c){
  if(!restoreRange())return;
  if(!rangeInBody(savedRange))return;
  applyHL(c);
  savedRange=null;
}
function tbFcApply(color){
  if(!restoreRange())return;
  if(!rangeInBody(savedRange))return;
  document.execCommand('foreColor',false,color);
  savedRange=null;
}

/* toolbar font color controls */
fcPick.addEventListener('input',()=>{curFC=fcPick.value;fcBar.style.background=curFC;G('fbFcBar').style.background=curFC;G('fbFcPick').value=curFC;});
fcPick.addEventListener('change',()=>{curFC=fcPick.value;fcBar.style.background=curFC;tbFcApply(curFC);});
G('fcWrap').addEventListener('mousedown',e=>{
  if(e.target===fcPick){e.stopPropagation();return;} // let color input open
  e.preventDefault();// don't steal focus
  restoreRange();
  if(rangeInBody(savedRange)){document.execCommand('foreColor',false,curFC);savedRange=null;}
});

fcBar.style.background=curFC;

/* ── FLOATING BAR buttons — use onmousedown+preventDefault so selection survives ── */
function fbFmt(e,cmd){
  e.preventDefault();e.stopPropagation();
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed)return;
  document.execCommand(cmd,false,null);
  /* keep bar visible momentarily so user can chain commands */
}
function fbHL(e,c){
  e.preventDefault();e.stopPropagation();
  applyHL(c);
  hideFBar();
}
function fbFcApply(color){
  curFC=color;fcBar.style.background=color;G('fbFcBar').style.background=color;fcPick.value=color;G('fbFcPick').value=color;
  const sel=window.getSelection();
  if(sel&&!sel.isCollapsed) document.execCommand('foreColor',false,color);
}
function fbCopy(e){
  e.preventDefault();e.stopPropagation();
  const s=window.getSelection();if(s)navigator.clipboard.writeText(s.toString()).catch(()=>{});
  hideFBar();
}
function fbNote(e){
  e.preventDefault();e.stopPropagation();
  hideFBar();
  openNoteDialog();
}

/* ── Highlight apply (works with active selection) ── */
function applyHL(c){
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed)return;
  const range=sel.getRangeAt(0);
  let cn=range.commonAncestorContainer;if(cn.nodeType===3)cn=cn.parentNode;
  if(!cn.closest||!cn.closest('.lt-body'))return;
  try{
    const sp=document.createElement('span');sp.className='hl hl-'+c;
    range.surroundContents(sp);
  }catch{
    const frag=range.extractContents();
    const sp=document.createElement('span');sp.className='hl hl-'+c;
    sp.appendChild(frag);range.insertNode(sp);
  }
  sel.removeAllRanges();
}

/* ── Floating bar show/hide logic ── */
function showFBar(rect){
  // position above selection
  const bw=fbar.offsetWidth||340;
  const bh=fbar.offsetHeight||40;
  let left=rect.left+rect.width/2-bw/2;
  let top=rect.top-bh-8;
  if(left<8)left=8;
  if(left+bw>innerWidth-8)left=innerWidth-bw-8;
  if(top<8)top=rect.bottom+8; // show below if no room above
  fbar.style.left=left+'px';fbar.style.top=top+'px';
  fbar.classList.add('on');
}
function hideFBar(){fbar.classList.remove('on');}

/* Show fbar on selection — listen to selectionchange for real-time updates */
document.addEventListener('selectionchange',()=>{
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed||!sel.toString().trim()){hideFBar();return;}
  if(sel.rangeCount===0)return;
  const range=sel.getRangeAt(0);
  let cn=range.commonAncestorContainer;if(cn.nodeType===3)cn=cn.parentNode;
  if(!cn||!cn.closest||!cn.closest('.lt-body')){hideFBar();return;}
  // save range for toolbar usage
  saveRange();
  const rect=range.getBoundingClientRect();
  if(rect.width===0&&rect.height===0){hideFBar();return;}
  showFBar(rect);
});

/* Hide bar when clicking outside of it and outside of lt-body */
document.addEventListener('mousedown',e=>{
  if(e.target.closest('#fbar'))return; // clicking inside bar — handled by onmousedown handlers
  hideFBar();
});

/* Also save range on mouseup in case selectionchange missed it */
document.addEventListener('mouseup',e=>{
  if(e.target.closest('#fbar'))return;
  saveRange();
});

/* ═══ Notes ═══ */
function editNote(el){
  const tiao=el.closest('.lt');if(!tiao)return;
  noteTarget=tiao.id;
  const txt=el.querySelector('span')?.textContent||'';
  G('dlgTA').value=txt;G('overlay').classList.add('on');G('dlg').classList.add('on');G('dlgTA').focus();
}
function openNoteDialog(){
  noteTarget=null;
  for(const el of QA('.doc.active .lt')){const r=el.getBoundingClientRect();if(r.top>=0&&r.top<innerHeight*.6){noteTarget=el.id;break;}}
  G('dlgTA').value=noteTarget&&docs[activeId]?.notes[noteTarget]?docs[activeId].notes[noteTarget]:'';
  G('overlay').classList.add('on');G('dlg').classList.add('on');G('dlgTA').focus();
}
function closeNote(){G('overlay').classList.remove('on');G('dlg').classList.remove('on');noteTarget=null;}
function saveNote(){
  const txt=G('dlgTA').value.trim();if(!txt||!activeId){closeNote();return;}
  const tid=noteTarget||'tiao-1';docs[activeId].notes[tid]=txt;
  const lt=G(tid);if(lt){
    const body=Q('.lt-body',lt);let note=Q('.lt-note',lt);
    if(note){note.innerHTML='📝 <span>'+esc(txt)+'</span>';}
    else{const d=document.createElement('div');d.className='lt-note';d.contentEditable='false';d.title='点击编辑批注';d.onclick=()=>editNote(d);d.innerHTML='📝 <span>'+esc(txt)+'</span>';(body||lt).appendChild(d);}
  }
  closeNote();
}
G('noteBtn').addEventListener('click',openNoteDialog);

/* ═══ Bookmarks ═══ */
G('bmBtn').addEventListener('click',()=>{
  if(!activeId)return;
  let target=null;
  for(const el of QA('.doc.active .lt')){const r=el.getBoundingClientRect();if(r.top>=40&&r.top<innerHeight*.55){target=el;break;}}
  if(!target){for(const el of QA('.doc.active .lt')){if(el.getBoundingClientRect().bottom>0){target=el;break;}}}
  if(!target)return;
  const id=target.id;const doc=docs[activeId];
  const numEl=Q('.lt-num',target);const numTxt=numEl?numEl.textContent:id;
  if(!doc.bookmarks.some(b=>b.id===id)){doc.bookmarks.push({id,num:numTxt});target.setAttribute('data-bm','true');refreshBMPanel();}
});
function removeBM(docId,tiaoId){const doc=docs[docId];if(!doc)return;doc.bookmarks=doc.bookmarks.filter(b=>b.id!==tiaoId);const el=G(tiaoId);if(el)el.removeAttribute('data-bm');refreshBMPanel();}
function refreshBMPanel(){
  if(!activeId){bmPanel.classList.remove('on');return;}
  const doc=docs[activeId];
  if(!doc||!doc.bookmarks.length){bmPanel.classList.remove('on');return;}
  bmPanel.classList.add('on');bmList.innerHTML='';
  const colors=['#e67e22','#27ae60','#2980b9','#8e44ad','#c0392b'];
  doc.bookmarks.forEach((bm,i)=>{
    const item=document.createElement('div');item.className='bm-item';
    const del=document.createElement('span');del.className='bm-del';del.textContent='✕';del.title='删除书签';del.onclick=e=>{e.stopPropagation();removeBM(activeId,bm.id);};
    item.innerHTML=`<div class="bm-dot" style="background:${colors[i%colors.length]}"></div><span>${esc(bm.num)}</span>`;
    item.appendChild(del);item.onclick=()=>scrollID(bm.id);
    bmList.appendChild(item);
  });
}

/* ═══ Copy tiao ═══ */
function copyTiao(el){
  const num=Q('.lt-num',el)?.textContent||'';
  const body=Q('.lt-body',el);
  const txt=body?(num+'　'+(body.innerText||body.textContent)).trim():'';
  navigator.clipboard.writeText(txt).then(()=>{const cp=Q('.lt-cp',el);if(cp){cp.textContent='✓';setTimeout(()=>cp.textContent='⧉',1400);}}).catch(()=>{});
}

/* ═══ Search ═══ */
sinput.addEventListener('input',debounce(doSearch,200));
sinput.addEventListener('focus',()=>{if(sinput.value.trim())doSearch();});
document.addEventListener('click',e=>{if(!e.target.closest('.sb-search'))sres.classList.remove('on');});
function doSearch(){
  const q=sinput.value.trim();if(!q){sres.classList.remove('on');return;}
  const res=[];
  for(const [id,doc] of Object.entries(docs)){
    for(const b of doc.parsed.blocks){
      if(b.type!=='tiao')continue;
      const full=b.num+b.content+b.kuan.map(k=>k.text).join('');
      if(full.includes(q))res.push({id,bid:b.id,num:b.num,snip:getSnip(full,q),title:doc.parsed.title});
    }
  }
  sres.innerHTML='';
  if(!res.length){sres.innerHTML='<div class="sri" style="color:var(--text3)">未找到</div>';}
  else res.slice(0,20).forEach(r=>{
    const el=document.createElement('div');el.className='sri';
    el.innerHTML=`<div class="sri-t"><span style="color:var(--accent);font-family:var(--font-mono)">${esc(r.num)}</span>　${esc(r.title)}</div><div>${r.snip}</div>`;
    el.onclick=()=>{swDoc(r.id);scrollID(r.bid);sres.classList.remove('on');};
    sres.appendChild(el);
  });
  sres.classList.add('on');
}
function getSnip(text,q){const i=text.indexOf(q);if(i<0)return esc(text.slice(0,60));const s=Math.max(0,i-16),e=Math.min(text.length,i+q.length+36);return(s>0?'…':'')+esc(text.slice(s,e)).replace(new RegExp(esc(q),'g'),`<mark>${esc(q)}</mark>`)+(e<text.length?'…':'');}
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}

/* ═══ Toolbar events ═══ */
G('fSel').onchange=function(){css('--font-body',this.value);};
function adjFS(d){const c=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--fs')||'16');const v=Math.min(22,Math.max(12,c+d));applyFS(v);G('fsRange').value=v;}
G('spBtn').onclick=()=>spanel.classList.toggle('on');
G('focBtn').onclick=()=>{sidebar.classList.toggle('collapsed');G('focBtn').classList.toggle('on');};
G('sbTog').addEventListener('click',()=>{if(isMob)toggleMobSB();else sidebar.classList.toggle('collapsed');});
function toggleMobSB(){sidebar.classList.toggle('mobile-on');sbOv.classList.toggle('on');}
function closeMobSB(){sidebar.classList.remove('mobile-on');sbOv.classList.remove('on');}

/* Export */
G('expBtn').onclick=e=>{const r=e.currentTarget.getBoundingClientRect();emenu.style.left=r.left+'px';emenu.style.top=(r.bottom+4)+'px';emenu.classList.toggle('on');};
document.addEventListener('click',e=>{if(!e.target.closest('#expBtn')&&!e.target.closest('#emenu'))emenu.classList.remove('on');});
function expMD(){
  emenu.classList.remove('on');if(!activeId)return;
  const doc=docs[activeId],c=G('doc-'+activeId);
  let md=`# ${doc.parsed.title}\n\n`;
  for(const b of doc.parsed.blocks){
    if(b.type==='title')continue;
    if(b.type==='pian')md+=`\n---\n\n## ${b.num}　${b.title}\n\n---\n\n`;
    else if(b.type==='zhang')md+=`\n### ${b.num}　${b.title}\n\n`;
    else if(b.type==='jie')md+=`\n#### ${b.num}　${b.title}\n\n`;
    else if(b.type==='tiao'){const el=c?.querySelector('#'+b.id);const body=el?Q('.lt-body',el):null;md+=(body?(body.innerText||body.textContent).trim():`**${b.num}**　${b.content}`)+'\n\n';if(doc.notes[b.id])md+=`> 📝 ${doc.notes[b.id]}\n\n`;}
    else if(b.type==='text')md+=b.text+'\n\n';
  }
  dlText(md,doc.parsed.title+'.md','text/markdown');
}
function expTXT(){emenu.classList.remove('on');if(!activeId)return;const c=G('doc-'+activeId);dlText(c?(c.innerText||c.textContent):docs[activeId].raw,docs[activeId].parsed.title+'.txt','text/plain');}
function expPDF(){
  emenu.classList.remove('on');if(!activeId)return;
  QA('.doc').forEach(el=>el.classList.remove('print-t','active'));
  const c=G('doc-'+activeId);if(c)c.classList.add('print-t','active');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{window.print();setTimeout(()=>{QA('.doc').forEach(el=>el.classList.remove('print-t'));QA('.doc').forEach(el=>el.classList.toggle('active',el.id==='doc-'+activeId));},1500);}));
}
function dlText(content,name,mime){const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([content],{type:mime+';charset=utf-8'})),download:name});a.click();URL.revokeObjectURL(a.href);}

/* Settings */
function closeSettings(){spanel.classList.remove('on');}
function setTheme(t){document.documentElement.setAttribute('data-theme',t);QA('.tsw').forEach(s=>s.classList.toggle('active',s.getAttribute('data-t')===t));QA('.cdot').forEach(s=>s.classList.toggle('active',s.getAttribute('data-t')===t));}
function setFont(btn){css('--font-body',btn.getAttribute('data-font'));QA('.fbtn').forEach(b=>b.classList.toggle('active',b===btn));G('fSel').value=btn.getAttribute('data-font');}
function applyFS(v){css('--fs',v+'px');G('fsVal').textContent=v+'px';}
function applyLH(v){css('--lh',v);G('lhVal').textContent=parseFloat(v).toFixed(1);}
function applyLS(v){css('--ls',v+'em');G('lsVal').textContent=parseFloat(v).toFixed(2);}
function applyInd(v){css('--indent',v+'em');G('indVal').textContent=v+'em';}
function applyCW(v){css('--cw',v+'px');G('cwVal').textContent=v;}

/* Loading */
function showLoad(v,msg){G('lmask').classList.toggle('on',v);if(msg)G('ltxt').textContent=msg;}

/* Resize */
window.addEventListener('resize',()=>{isMob=innerWidth<=768;if(!isMob){sidebar.classList.remove('mobile-on');sbOv.classList.remove('on');}});

/* Keyboard shortcuts */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeSettings();closeNote();hideFBar();emenu.classList.remove('on');sres.classList.remove('on');if(isMob)closeMobSB();}
  if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();sinput.focus();sinput.select();}
  if((e.ctrlKey||e.metaKey)&&e.key===','){e.preventDefault();spanel.classList.toggle('on');}
  /* in-body shortcuts */
  const act=document.activeElement;
  if(act&&act.classList.contains('lt-body')){
    if((e.ctrlKey||e.metaKey)&&e.key==='b'){e.preventDefault();document.execCommand('bold',false,null);}
    if((e.ctrlKey||e.metaKey)&&e.key==='i'){e.preventDefault();document.execCommand('italic',false,null);}
    if((e.ctrlKey||e.metaKey)&&e.key==='u'){e.preventDefault();document.execCommand('underline',false,null);}
  }
});
</script>
