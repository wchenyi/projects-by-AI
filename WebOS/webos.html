<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebOS</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --glass: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.22);
    --glass-hover: rgba(255,255,255,0.18);
    --blur: 20px;
    --accent: #60a5fa;
    --accent2: #a78bfa;
    --danger: #f87171;
    --success: #34d399;
    --warn: #fbbf24;
    --text: #f0f4ff;
    --text-dim: rgba(240,244,255,0.6);
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --taskbar-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: #0a0a1a;
    overflow: hidden;
    width: 100vw; height: 100vh;
    color: var(--text);
  }

  /* в”Җв”Җ WALLPAPER в”Җв”Җ */
  #wallpaper {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(96,165,250,0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(167,139,250,0.25) 0%, transparent 55%),
      radial-gradient(ellipse at 60% 80%, rgba(52,211,153,0.15) 0%, transparent 50%),
      linear-gradient(135deg, #070718 0%, #0d0d2b 40%, #0a0a1a 100%);
    animation: bgPulse 12s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    from { filter: hue-rotate(0deg); }
    to { filter: hue-rotate(30deg); }
  }

  /* stars */
  #wallpaper::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 45%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 25%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 75%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 90%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 55%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 70%, rgba(255,255,255,0.7) 0%, transparent 100%);
  }

  /* в”Җв”Җ DESKTOP в”Җв”Җ */
  #desktop {
    position: fixed; inset: 0 0 var(--taskbar-h) 0; z-index: 1;
    padding: 20px;
    display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
  }

  .desktop-icon {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    width: 80px; padding: 8px 4px; border-radius: 12px;
    cursor: pointer; transition: background 0.15s;
  }
  .desktop-icon:hover { background: rgba(255,255,255,0.12); }
  .desktop-icon:active { background: rgba(255,255,255,0.2); }
  .desktop-icon .ico { font-size: 36px; line-height: 1; }
  .desktop-icon span { font-size: 11px; text-align: center; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }

  /* в”Җв”Җ TASKBAR в”Җв”Җ */
  #taskbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
    height: var(--taskbar-h);
    background: rgba(10,10,26,0.7);
    backdrop-filter: blur(var(--blur));
    border-top: 1px solid var(--glass-border);
    display: flex; align-items: center; padding: 0 16px; gap: 8px;
  }

  #start-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 12px;
    width: 40px; height: 40px; cursor: pointer;
    font-size: 20px; display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
  }
  #start-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(96,165,250,0.5); }

  #task-apps {
    display: flex; gap: 4px; flex: 1; overflow-x: auto;
  }
  #task-apps::-webkit-scrollbar { display: none; }

  .task-item {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    padding: 4px 12px;
    cursor: pointer; font-size: 12px;
    display: flex; align-items: center; gap: 6px;
    transition: background 0.15s;
    white-space: nowrap;
    max-width: 160px;
  }
  .task-item:hover { background: var(--glass-hover); }
  .task-item.active { background: rgba(96,165,250,0.25); border-color: rgba(96,165,250,0.5); }
  .task-item .t-ico { font-size: 14px; }
  .task-item .t-title { overflow: hidden; text-overflow: ellipsis; }

  #clock-area {
    display: flex; flex-direction: column; align-items: flex-end;
    font-size: 11px; flex-shrink: 0; cursor: pointer;
  }
  #clock { font-size: 15px; font-weight: 500; font-variant-numeric: tabular-nums; }
  #date-display { color: var(--text-dim); }

  /* в”Җв”Җ WINDOWS в”Җв”Җ */
  .window {
    position: fixed;
    background: rgba(15,15,35,0.85);
    backdrop-filter: blur(var(--blur));
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    box-shadow: var(--shadow), 0 0 0 0.5px rgba(255,255,255,0.05);
    display: flex; flex-direction: column;
    overflow: hidden;
    transition: box-shadow 0.2s;
    min-width: 300px; min-height: 200px;
  }
  .window.focused { box-shadow: 0 16px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(96,165,250,0.3); }

  .window-titlebar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid var(--glass-border);
    cursor: move; flex-shrink: 0;
  }
  .win-controls { display: flex; gap: 6px; flex-shrink: 0; }
  .wc { width: 14px; height: 14px; border-radius: 50%; cursor: pointer; transition: filter 0.15s; }
  .wc:hover { filter: brightness(1.3); }
  .wc-close { background: var(--danger); }
  .wc-min { background: var(--warn); }
  .wc-max { background: var(--success); }
  .win-title { flex: 1; text-align: center; font-size: 13px; font-weight: 500; pointer-events: none; }
  .win-icon { font-size: 15px; }

  .window-body {
    flex: 1; overflow: auto; position: relative;
  }
  .window-body::-webkit-scrollbar { width: 6px; }
  .window-body::-webkit-scrollbar-track { background: transparent; }
  .window-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

  .resize-handle {
    position: absolute; bottom: 0; right: 0;
    width: 20px; height: 20px; cursor: se-resize;
    opacity: 0.4;
    background: linear-gradient(135deg, transparent 50%, var(--glass-border) 50%);
  }

  /* в”Җв”Җ START MENU в”Җв”Җ */
  #start-menu {
    position: fixed; bottom: calc(var(--taskbar-h) + 8px); left: 16px;
    width: 320px;
    background: rgba(10,10,28,0.92);
    backdrop-filter: blur(30px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 16px;
    z-index: 999;
    display: none;
    box-shadow: var(--shadow);
  }
  #start-menu.visible { display: block; animation: popUp 0.2s ease; }
  @keyframes popUp {
    from { opacity: 0; transform: translateY(10px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  #start-menu h3 { font-size: 13px; color: var(--text-dim); margin-bottom: 10px; font-weight: 400; }
  .menu-apps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
  .menu-app {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 4px; border-radius: 10px; cursor: pointer;
    transition: background 0.15s;
  }
  .menu-app:hover { background: var(--glass-hover); }
  .menu-app .ico { font-size: 28px; }
  .menu-app span { font-size: 10px; color: var(--text-dim); text-align: center; }
  .menu-footer { display: flex; justify-content: flex-end; gap: 8px; padding-top: 10px; border-top: 1px solid var(--glass-border); }
  .menu-btn {
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 8px; padding: 6px 14px; cursor: pointer;
    font-size: 12px; color: var(--text); transition: background 0.15s;
  }
  .menu-btn:hover { background: var(--glass-hover); }
  .menu-search {
    width: 100%; padding: 8px 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--glass-border);
    border-radius: 8px; color: var(--text); font-size: 13px;
    margin-bottom: 14px; outline: none;
  }
  .menu-search:focus { border-color: var(--accent); }

  /* в”Җв”Җ NOTIFICATION в”Җв”Җ */
  #notif-container {
    position: fixed; top: 16px; right: 16px; z-index: 9999;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  .notif {
    background: rgba(15,15,35,0.92);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 12px 16px;
    min-width: 260px; max-width: 320px;
    box-shadow: var(--shadow);
    animation: slideIn 0.3s ease;
    pointer-events: auto;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .notif-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .notif-body { font-size: 12px; color: var(--text-dim); }

  /* в”Җв”Җ CONTEXT MENU в”Җв”Җ */
  #ctx-menu {
    position: fixed; z-index: 9000;
    background: rgba(10,10,28,0.95);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 4px;
    min-width: 160px;
    display: none;
    box-shadow: var(--shadow);
  }
  #ctx-menu.visible { display: block; animation: popUp 0.15s ease; }
  .ctx-item {
    padding: 8px 12px; font-size: 13px; cursor: pointer;
    border-radius: 6px; transition: background 0.1s;
    display: flex; align-items: center; gap: 8px;
  }
  .ctx-item:hover { background: var(--glass-hover); }
  .ctx-sep { height: 1px; background: var(--glass-border); margin: 4px 0; }

  /* в”Җв”Җ APP STYLES в”Җв”Җ */
  /* File Manager */
  .fm-wrap { display: flex; height: 100%; }
  .fm-sidebar { width: 140px; background: rgba(0,0,0,0.2); padding: 10px; flex-shrink: 0; }
  .fm-sidebar-item { padding: 7px 10px; border-radius: 7px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 7px; transition: background 0.15s; }
  .fm-sidebar-item:hover { background: var(--glass-hover); }
  .fm-sidebar-item.active { background: rgba(96,165,250,0.2); color: var(--accent); }
  .fm-main { flex: 1; padding: 14px; }
  .fm-toolbar { display: flex; gap: 6px; margin-bottom: 12px; align-items: center; }
  .fm-btn { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; color: var(--text); transition: background 0.15s; }
  .fm-btn:hover { background: var(--glass-hover); }
  .fm-path { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--text-dim); }
  .fm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px,1fr)); gap: 8px; }
  .fm-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
  .fm-item:hover { background: var(--glass-hover); }
  .fm-item.selected { background: rgba(96,165,250,0.2); }
  .fm-item .ico { font-size: 32px; }
  .fm-item span { font-size: 11px; text-align: center; word-break: break-word; }

  /* Terminal */
  .term-body { background: rgba(0,0,0,0.5); height: 100%; display: flex; flex-direction: column; padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .term-output { flex: 1; overflow-y: auto; margin-bottom: 8px; line-height: 1.6; }
  .term-output::-webkit-scrollbar { width: 4px; }
  .term-output::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
  .term-line { margin-bottom: 2px; }
  .term-prompt { color: var(--success); }
  .term-cmd { color: var(--accent); }
  .term-err { color: var(--danger); }
  .term-info { color: var(--text-dim); }
  .term-input-row { display: flex; align-items: center; gap: 4px; }
  .term-ps { color: var(--success); white-space: nowrap; }
  .term-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: inherit; font-size: 13px; caret-color: var(--accent); }

  /* Text Editor */
  .editor-toolbar { display: flex; gap: 4px; padding: 8px; border-bottom: 1px solid var(--glass-border); flex-wrap: wrap; }
  .ed-btn { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 5px; padding: 3px 8px; cursor: pointer; font-size: 12px; color: var(--text); transition: background 0.15s; }
  .ed-btn:hover { background: var(--glass-hover); }
  .editor-area { width: 100%; height: calc(100% - 50px); background: transparent; border: none; outline: none; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 12px; resize: none; line-height: 1.7; }

  /* Calculator */
  .calc-body { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .calc-display { background: rgba(0,0,0,0.4); border-radius: 10px; padding: 16px; text-align: right; }
  .calc-expr { font-size: 12px; color: var(--text-dim); min-height: 18px; }
  .calc-num { font-size: 32px; font-weight: 300; font-variant-numeric: tabular-nums; overflow: hidden; text-overflow: ellipsis; }
  .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .calc-key {
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 10px; padding: 14px 6px; font-size: 16px; cursor: pointer;
    text-align: center; transition: background 0.12s, transform 0.1s;
    color: var(--text);
  }
  .calc-key:hover { background: var(--glass-hover); }
  .calc-key:active { transform: scale(0.93); }
  .calc-key.op { color: var(--accent); }
  .calc-key.eq { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; }
  .calc-key.clear { color: var(--danger); }

  /* Clock / World Time */
  .clock-body { padding: 20px; }
  .analog-clock { width: 180px; height: 180px; border-radius: 50%; border: 3px solid var(--glass-border); position: relative; margin: 0 auto 20px; background: rgba(0,0,0,0.3); }
  .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; border-radius: 4px; }
  .hour-hand { width: 4px; height: 52px; background: var(--text); margin-left: -2px; }
  .min-hand { width: 2px; height: 70px; background: var(--accent); margin-left: -1px; }
  .sec-hand { width: 1px; height: 78px; background: var(--danger); margin-left: -0.5px; }
  .clock-center { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; transform: translate(-50%,-50%); }
  .clock-marks::before, .clock-marks::after { content: ''; position: absolute; }
  .world-times { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .wt-item { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px; padding: 10px; }
  .wt-city { font-size: 12px; color: var(--text-dim); }
  .wt-time { font-size: 18px; font-variant-numeric: tabular-nums; }

  /* Settings */
  .settings-body { display: flex; height: 100%; }
  .settings-sidebar { width: 160px; background: rgba(0,0,0,0.2); padding: 10px; }
  .settings-item { padding: 8px 10px; border-radius: 7px; cursor: pointer; font-size: 13px; transition: background 0.15s; }
  .settings-item:hover { background: var(--glass-hover); }
  .settings-item.active { background: rgba(96,165,250,0.2); color: var(--accent); }
  .settings-panel { flex: 1; padding: 20px; overflow-y: auto; }
  .settings-group { margin-bottom: 24px; }
  .settings-group h3 { font-size: 14px; font-weight: 500; margin-bottom: 12px; color: var(--accent); }
  .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .setting-label { font-size: 13px; }
  .toggle { width: 40px; height: 22px; background: rgba(255,255,255,0.15); border-radius: 11px; cursor: pointer; position: relative; transition: background 0.2s; }
  .toggle.on { background: var(--accent); }
  .toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: transform 0.2s; }
  .toggle.on::after { transform: translateX(18px); }
  .slider-row { display: flex; align-items: center; gap: 10px; }
  input[type=range] { appearance: none; width: 120px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); }
  .color-swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
  .color-swatch.selected { border-color: white; }
  .swatch-row { display: flex; gap: 8px; }

  /* Photo Viewer */
  .photo-body { display: flex; flex-direction: column; height: 100%; }
  .photo-toolbar { display: flex; gap: 6px; padding: 8px; border-bottom: 1px solid var(--glass-border); align-items: center; }
  .photo-area { flex: 1; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); overflow: hidden; }
  .photo-area img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; }
  .photo-placeholder { text-align: center; color: var(--text-dim); }
  .photo-placeholder .big-ico { font-size: 64px; display: block; margin-bottom: 10px; }
  .photo-thumb-bar { display: flex; gap: 6px; padding: 8px; overflow-x: auto; border-top: 1px solid var(--glass-border); }
  .photo-thumb-bar::-webkit-scrollbar { height: 4px; }
  .photo-thumb-bar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

  /* Browser */
  .browser-body { display: flex; flex-direction: column; height: 100%; }
  .browser-toolbar { display: flex; gap: 6px; padding: 8px; border-bottom: 1px solid var(--glass-border); align-items: center; }
  .browser-url { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); border-radius: 6px; padding: 5px 10px; font-size: 13px; color: var(--text); outline: none; }
  .browser-url:focus { border-color: var(--accent); }
  .browser-frame { flex: 1; background: #fff; border: none; }

  /* System Monitor */
  .sysmon-body { padding: 16px; }
  .sysmon-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .sysmon-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 10px; padding: 14px; }
  .sysmon-label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
  .sysmon-val { font-size: 24px; font-weight: 300; }
  .sysmon-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .sysmon-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
  .proc-list { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 10px; padding: 12px; }
  .proc-header { display: grid; grid-template-columns: 1fr 80px 80px; gap: 8px; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--glass-border); }
  .proc-row { display: grid; grid-template-columns: 1fr 80px 80px; gap: 8px; font-size: 12px; padding: 5px 0; }

  /* Music Player */
  .music-body { padding: 20px; text-align: center; }
  .music-art { width: 140px; height: 140px; border-radius: 16px; background: linear-gradient(135deg, var(--accent), var(--accent2)); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 56px; }
  .music-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
  .music-artist { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }
  .music-progress { background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; margin-bottom: 8px; position: relative; cursor: pointer; }
  .music-prog-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.5s; }
  .music-times { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 16px; }
  .music-controls { display: flex; justify-content: center; gap: 16px; align-items: center; }
  .m-btn { background: none; border: none; color: var(--text); cursor: pointer; font-size: 20px; transition: transform 0.15s; }
  .m-btn:hover { transform: scale(1.15); color: var(--accent); }
  .m-btn.play { width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .music-list { margin-top: 16px; text-align: left; }

<script>
/* в”Җв”Җ STATE в”Җв”Җ */
let windows = {};
let zCounter = 100;
let focusedWin = null;
let dragState = null;
let resizeState = null;
let termHistory = [];
let termHistIdx = 0;
let musicPlaying = false;
let musicIdx = 0;
let musicTimer = null;
let musicProgress = 0;

let drawSize = 4;

let calcExpr = '';

let calcPrevValue = null;

let activeNote = null;

let clockInterval = null;
let weatherWallpapers = ['default','sunset','night','forest','ocean'];

/* в”Җв”Җ APPS DEFINITION в”Җв”Җ */
const apps = [
  { id: 'files', name: 'ж–Үд»¶з®ЎзҗҶеҷЁ', ico: 'рҹ“Ғ', w: 680, h: 460 },
  { id: 'terminal', name: 'з»Ҳз«Ҝ', ico: 'рҹ’»', w: 600, h: 400 },
  { id: 'editor', name: 'ж–Үжң¬зј–иҫ‘', ico: 'рҹ“қ', w: 620, h: 480 },
  { id: 'calc', name: 'и®Ўз®—еҷЁ', ico: 'рҹ§®', w: 320, h: 480 },
  { id: 'clock', name: 'ж—¶й’ҹ', ico: 'рҹ•җ', w: 360, h: 420 },
  { id: 'browser', name: 'жөҸи§ҲеҷЁ', ico: 'рҹҢҗ', w: 800, h: 560 },
  { id: 'sysmon', name: 'зі»з»ҹзӣ‘жҺ§', ico: 'рҹ“Ҡ', w: 520, h: 460 },
  { id: 'music', name: 'йҹід№җж’ӯж”ҫеҷЁ', ico: 'рҹҺө', w: 360, h: 560 },
  { id: 'notes', name: 'дҫҝзӯҫ', ico: 'рҹ“Ң', w: 600, h: 460 },
  { id: 'draw', name: 'з”»жқҝ', ico: 'рҹҺЁ', w: 680, h: 500 },
  { id: 'weather', name: 'еӨ©ж°”', ico: 'рҹҢӨпёҸ', w: 460, h: 500 },
  { id: 'settings', name: 'и®ҫзҪ®', ico: 'вҡҷпёҸ', w: 560, h: 440 },
];

/* в”Җв”Җ POPULATE MENU & DESKTOP ICONS в”Җв”Җ */
function init() {
  const grid = document.getElementById('menu-apps-grid');
  const desktop = document.getElementById('desktop');
  apps.forEach(app => {
    // menu
    const el = document.createElement('div');
    el.className = 'menu-app';
    el.innerHTML = `<div class="ico">${app.ico}</div><span>${app.name}</span>`;
    el.onclick = () => { openApp(app.id); toggleMenu(false); };
    grid.appendChild(el);
    // desktop icon
    const d = document.createElement('div');
    d.className = 'desktop-icon';
    d.innerHTML = `<div class="ico">${app.ico}</div><span>${app.name}</span>`;
    d.ondblclick = () => openApp(app.id);
    desktop.appendChild(d);
  });

  // Menu search filter
  document.querySelector('.menu-search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.menu-app').forEach(a => {
      const name = a.querySelector('span').textContent.toLowerCase();
      a.style.display = name.includes(q) ? '' : 'none';
    });
  });

  startClock();
  startNotes();
  setupContextMenu();
}

/* в”Җв”Җ CLOCK в”Җв”Җ */
function startClock() {
  updateClock();
  clockInterval = setInterval(updateClock, 1000);
}
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('zh-CN', {hour12:false});
  document.getElementById('date-display').textContent = now.toLocaleDateString('zh-CN',{month:'short',day:'numeric',weekday:'short'});
}

/* в”Җв”Җ START MENU в”Җв”Җ */
document.getElementById('start-btn').onclick = () => toggleMenu();
function toggleMenu(force) {
  const m = document.getElementById('start-menu');
  const v = force !== undefined ? force : !m.classList.contains('visible');
  m.classList.toggle('visible', v);
}

/* в”Җв”Җ CONTEXT MENU в”Җв”Җ */
function setupContextMenu() {
  document.getElementById('desktop').addEventListener('contextmenu', e => {
    if (e.target.closest('.window')) return;
    e.preventDefault();
    const ctx = document.getElementById('ctx-menu');
    ctx.style.left = Math.min(e.clientX, window.innerWidth-170) + 'px';
    ctx.style.top = Math.min(e.clientY, window.innerHeight-200) + 'px';
    ctx.classList.add('visible');
  });
}
function closeCtx() { document.getElementById('ctx-menu').classList.remove('visible'); }
document.addEventListener('click', e => {
  if (!e.target.closest('#ctx-menu')) closeCtx();
  if (!e.target.closest('#start-menu') && !e.target.closest('#start-btn')) toggleMenu(false);
});
document.addEventListener('contextmenu', e => { if (!e.target.closest('#desktop') && !e.target.closest('.window')) closeCtx(); });

/* в”Җв”Җ NOTIFICATION в”Җв”Җ */
function notify(title, body) {
  const c = document.getElementById('notif-container');
  const n = document.createElement('div');
  n.className = 'notif';
  n.innerHTML = `<div class="notif-title">рҹ”” ${title}</div><div class="notif-body">${body}</div>`;
  n.onclick = () => n.remove();
  c.appendChild(n);
  setTimeout(() => { n.style.transition = 'opacity 0.3s'; n.style.opacity = '0'; setTimeout(() => n.remove(), 300); }, 4000);
}

/* в”Җв”Җ WINDOW MANAGER в”Җв”Җ */
function openApp(id) {
  if (windows[id]) {
    focusWin(id);
    const win = document.getElementById('win-'+id);
    if (win) win.classList.remove('minimized');
    return;
  }
  const app = apps.find(a => a.id === id);
  const ww = Math.min(app.w, window.innerWidth - 40);
  const wh = Math.min(app.h, window.innerHeight - 80);
  const wx = Math.floor(Math.random() * Math.max(0, window.innerWidth - ww - 40)) + 20;
  const wy = Math.floor(Math.random() * Math.max(0, window.innerHeight - wh - 80)) + 20;

  const win = document.createElement('div');
  win.className = 'window';
  win.id = 'win-'+id;
  win.style.cssText = `left:${wx}px;top:${wy}px;width:${ww}px;height:${wh}px;z-index:${++zCounter}`;

  win.innerHTML = `
    <div class="window-titlebar">
      <div class="win-controls">
        <div class="wc wc-close" onclick="closeWin('${id}')"></div>
        <div class="wc wc-min" onclick="minimizeWin('${id}')"></div>
        <div class="wc wc-max" onclick="maximizeWin('${id}')"></div>
      </div>
      <div class="win-icon">${app.ico}</div>
      <div class="win-title">${app.name}</div>
    </div>
    <div class="window-body" id="wb-${id}">${buildApp(id)}</div>
    <div class="resize-handle" data-win="${id}"></div>
  `;

  document.body.appendChild(win);
  windows[id] = { id, maximized: false, prevPos: null };
  focusWin(id);
  addToTaskbar(id, app);
  initAppLogic(id);
  setupDrag(win);
  setupResize(win.querySelector('.resize-handle'));
}

function focusWin(id) {
  if (focusedWin) {
    const prev = document.getElementById('win-'+focusedWin);
    if (prev) prev.classList.remove('focused');
    const pt = document.querySelector(`.task-item[data-win="${focusedWin}"]`);
    if (pt) pt.classList.remove('active');
  }
  focusedWin = id;
  const win = document.getElementById('win-'+id);
  if (win) { win.classList.add('focused'); win.style.zIndex = ++zCounter; }
  const ti = document.querySelector(`.task-item[data-win="${id}"]`);
  if (ti) ti.classList.add('active');
}

function closeWin(id) {
  if (id === 'sysmon' && sysmonInterval) { clearInterval(sysmonInterval); sysmonInterval = null; }
  if (id === 'music' && musicTimer) { clearInterval(musicTimer); musicTimer = null; musicPlaying = false; }
  const win = document.getElementById('win-'+id);
  if (win) win.remove();
  delete windows[id];
  const ti = document.querySelector(`.task-item[data-win="${id}"]`);
  if (ti) ti.remove();
  if (focusedWin === id) focusedWin = null;
}

function minimizeWin(id) {
  const win = document.getElementById('win-'+id);
  if (win) win.classList.add('minimized');
  const ti = document.querySelector(`.task-item[data-win="${id}"]`);
  if (ti) ti.classList.remove('active');
  if (focusedWin === id) focusedWin = null;
}

function maximizeWin(id) {
  const w = windows[id];
  const win = document.getElementById('win-'+id);
  if (!win) return;
  if (!w.maximized) {
    w.prevPos = { left: win.style.left, top: win.style.top, width: win.style.width, height: win.style.height };
    win.style.cssText = `left:0;top:0;width:100vw;height:calc(100vh - var(--taskbar-h));z-index:${++zCounter}`;
    w.maximized = true;
  } else {
    Object.assign(win.style, w.prevPos);
    w.maximized = false;
  }
  focusWin(id);
}

function addToTaskbar(id, app) {
  const bar = document.getElementById('task-apps');
  const item = document.createElement('div');
  item.className = 'task-item';
  item.dataset.win = id;
  item.innerHTML = `<span class="t-ico">${app.ico}</span><span class="t-title">${app.name}</span>`;
  item.onclick = () => {
    const win = document.getElementById('win-'+id);
    if (!win) return;
    if (win.classList.contains('minimized')) {
      win.classList.remove('minimized');
      focusWin(id);
    } else if (focusedWin === id) {
      minimizeWin(id);
    } else {
      focusWin(id);
    }
  };
  bar.appendChild(item);
}

/* в”Җв”Җ DRAG в”Җв”Җ */
function setupDrag(win) {
  const tb = win.querySelector('.window-titlebar');
  tb.addEventListener('mousedown', e => {
    if (e.target.closest('.win-controls')) return;
    const id = win.id.replace('win-','');
    if (windows[id] && windows[id].maximized) return;
    focusWin(id);
    dragState = {
      win, startX: e.clientX - win.offsetLeft, startY: e.clientY - win.offsetTop
    };
    e.preventDefault();
  });
}
document.addEventListener('mousemove', e => {
  if (dragState) {
    const { win, startX, startY } = dragState;
    let nx = e.clientX - startX;
    let ny = e.clientY - startY;
    nx = Math.max(0, Math.min(nx, window.innerWidth - win.offsetWidth));
    ny = Math.max(0, Math.min(ny, window.innerHeight - win.offsetHeight - parseInt(getComputedStyle(document.documentElement).getPropertyValue('--taskbar-h'))));
    win.style.left = nx + 'px';
    win.style.top = ny + 'px';
  }
  if (resizeState) {
    const { win, startX, startY, startW, startH } = resizeState;
    const nw = Math.max(300, startW + e.clientX - startX);
    const nh = Math.max(200, startH + e.clientY - startY);
    win.style.width = nw + 'px';
    win.style.height = nh + 'px';
  }
});
document.addEventListener('mouseup', () => { dragState = null; resizeState = null; });

function setupResize(handle) {
  handle.addEventListener('mousedown', e => {
    const win = handle.closest('.window');
    resizeState = { win, startX: e.clientX, startY: e.clientY, startW: win.offsetWidth, startH: win.offsetHeight };
    e.preventDefault(); e.stopPropagation();
  });
}

/* Click to focus */
document.addEventListener('mousedown', e => {
  const win = e.target.closest('.window');
  if (win) { const id = win.id.replace('win-',''); focusWin(id); }
});

/* в”Җв”Җ APP CONTENT в”Җв”Җ */
function buildApp(id) {
  switch(id) {
    case 'files': return buildFiles();
    case 'terminal': return buildTerminal();
    case 'editor': return buildEditor();
    case 'calc': return buildCalc();
    case 'clock': return buildClock();
    case 'browser': return buildBrowser();
    case 'sysmon': return buildSysmon();
    case 'music': return buildMusic();
    case 'notes': return buildNotes();
    case 'draw': return buildDraw();
    case 'weather': return buildWeather();
    case 'settings': return buildSettings();
    default: return '<div style="padding:20px;color:var(--text-dim)">еә”з”ЁеҠ иҪҪдёӯ...</div>';
  }
}

/* в”Җв”Җ FILE MANAGER в”Җв”Җ */
const fsData = {
  home: [
    { name: 'ж–ҮжЎЈ', type: 'folder', ico: 'рҹ“Ғ' },

  ],

};
let fsCurrent = 'home';
let fsHistory = ['home'];

function buildFiles() {
  return `<div class="fm-wrap">
    <div class="fm-sidebar">
      <div class="fm-sidebar-item ${fsCurrent==='home'?'active':''}" onclick="fmNav('home')">рҹҸ  дё»зӣ®еҪ•</div>
      <div class="fm-sidebar-item" onclick="fmNav('ж–ҮжЎЈ')">рҹ“Ғ ж–ҮжЎЈ</div>
      <div class="fm-sidebar-item" onclick="fmNav('еӣҫзүҮ')">рҹ–јпёҸ еӣҫзүҮ</div>
      <div class="fm-sidebar-item" onclick="fmNav('йҹід№җ')">рҹҺө йҹід№җ</div>
      <div class="fm-sidebar-item" onclick="fmNav('дёӢиҪҪ')">рҹ“Ҙ дёӢиҪҪ</div>
      <div class="fm-sidebar-item" onclick="fmNav('и§Ҷйў‘')">рҹҺ¬ и§Ҷйў‘</div>
    </div>
    <div class="fm-main">
      <div class="fm-toolbar">
        <button class="fm-btn" onclick="fmBack()">вҶҗ иҝ”еӣһ</button>
        <div class="fm-path" id="fm-path">~/${fsCurrent==='home'?'':fsCurrent}</div>
        <button class="fm-btn" onclick="fmNewFile()">+ ж–°ж–Үд»¶</button>
      </div>
      <div class="fm-grid" id="fm-grid">${fmRenderItems()}</div>
    </div>
  </div>`;
}
function fmRenderItems() {
  const items = fsData[fsCurrent] || [];

  return items.map((item,i) => `
    <div class="fm-item" ondblclick="fmOpen('${item.name}','${item.type}')" onclick="fmSelect(this)">
      <div class="ico">${item.ico}</div>
      <span>${item.name}</span>
    </div>`).join('');
}

function termKey(e) {
  const inp = document.getElementById('term-in');
  if (e.key === 'ArrowUp') {
    if (termHistIdx > 0) { termHistIdx--; inp.value = termHistory[termHistIdx] || ''; }
    return;
  }
  if (e.key === 'ArrowDown') {
    if (termHistIdx < termHistory.length) { termHistIdx++; inp.value = termHistory[termHistIdx] || ''; }
    return;
  }
  if (e.key !== 'Enter') return;
  const cmd = inp.value.trim();
  inp.value = '';
  if (!cmd) return;
  termHistory.push(cmd); termHistIdx = termHistory.length;
  termPrint(`<span class="term-prompt">user@webos:~$</span> <span class="term-cmd">${escHTML(cmd)}</span>`);
  const parts = cmd.split(' ');
  const name = parts[0];
  if (name === 'echo') {
    termPrint(parts.slice(1).join(' '));
  } else if (name === 'open') {
    const appName = parts[1];
    const a = apps.find(x => x.id === appName || x.name === appName);
    if (a) { openApp(a.id); termPrint(`жӯЈеңЁжү“ејҖ ${a.name}...`); }
    else termPrint(`<span class="term-err">жңӘжүҫеҲ°еә”з”Ё: ${escHTML(parts[1])}</span>`);
  } else if (termCmds[name]) {
    const out = termCmds[name]();
    if (out !== null && out !== undefined) termPrint(out);
  } else {
    termPrint(`<span class="term-err">е‘Ҫд»ӨжңӘжүҫеҲ°: ${escHTML(name)}. иҫ“е…Ҙ 'help' жҹҘзңӢеё®еҠ©</span>`);
  }
  termScroll();
}
function termPrint(html) {
  const out = document.getElementById('term-out');
  if (!out) return;
  const lines = html.split('\n');
  lines.forEach(l => {
    const d = document.createElement('div');
    d.className = 'term-line';
    d.innerHTML = l;
    out.appendChild(d);
  });
}
function termScroll() {
  const out = document.getElementById('term-out');
  if (out) out.scrollTop = out.scrollHeight;
}
function escHTML(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* в”Җв”Җ CALCULATOR в”Җв”Җ */
function buildCalc() {
  const keys = [
    ['C','Вұ','%','Г·'],
    ['7','8','9','Г—'],
    ['4','5','6','вҲ’'],
    ['1','2','3','+'],
    ['0','.','вҢ«','='],
  ];
  const grid = keys.map(row => row.map(k => {
    let cls = 'calc-key';
    if (['Г·','Г—','вҲ’','+'].includes(k)) cls += ' op';
    if (k === '=') cls += ' eq';
    if (k === 'C') cls += ' clear';
    return `<div class="${cls}" onclick="calcPress('${k}')">${k}</div>`;
  }).join('')).join('');
  return `<div class="calc-body">
    <div class="calc-display">
      <div class="calc-expr" id="calc-expr"></div>
      <div class="calc-num" id="calc-num">0</div>
    </div>
    <div class="calc-grid">${grid}</div>
  </div>`;
}
function initCalc() { calcValue='0'; calcExpr=''; calcNewNum=true; calcPendingOp=null; calcPrevValue=null; updateCalcDisplay(); }
function updateCalcDisplay() {
  const numEl = document.getElementById('calc-num');
  const exprEl = document.getElementById('calc-expr');
  if (numEl) numEl.textContent = calcValue;
  if (exprEl) exprEl.textContent = calcExpr;
}
function calcPress(k) {
  if (!document.getElementById('calc-num')) return;
  if (k === 'C') { calcValue='0'; calcExpr=''; calcNewNum=true; calcPendingOp=null; calcPrevValue=null; }
  else if (k === 'Вұ') { calcValue = String(-parseFloat(calcValue)||0); }
  else if (k === '%') { calcValue = String(parseFloat(calcValue)/100); }
  else if (k === 'вҢ«') {
    if (calcValue.length > 1) calcValue = calcValue.slice(0,-1);
    else calcValue = '0';
  }
  else if (k === '.') {
    if (!calcValue.includes('.')) { calcValue += '.'; calcNewNum = false; }
  }
  else if (['Г·','Г—','вҲ’','+'].includes(k)) {
    calcPrevValue = parseFloat(calcValue);
    calcPendingOp = k;
    calcExpr = calcValue + ' ' + k;
    calcNewNum = true;
  }
  else if (k === '=') {
    if (calcPendingOp && calcPrevValue !== null) {
      const b = parseFloat(calcValue);
      let r;
      if (calcPendingOp==='Г·') r = b===0 ? 'Error' : calcPrevValue/b;
      else if (calcPendingOp==='Г—') r = calcPrevValue*b;
      else if (calcPendingOp==='вҲ’') r = calcPrevValue-b;
      else r = calcPrevValue+b;
      calcExpr = `${calcPrevValue} ${calcPendingOp} ${b} =`;
      calcValue = r === 'Error' ? 'Error' : String(parseFloat(r.toFixed(10)));
      calcPendingOp=null; calcPrevValue=null; calcNewNum=true;
    }
  }
  else { // digit
    if (calcNewNum || calcValue==='0') { calcValue=k; calcNewNum=false; }
    else calcValue += k;
  }
  updateCalcDisplay();
}

function buildClock() {
  const zones = [
    {city:'еҢ—дә¬', tz:'Asia/Shanghai'},

  const wtHtml = zones.map(z => `<div class="wt-item"><div class="wt-city">${z.city}</div><div class="wt-time" id="wt-${z.city}">--:--</div></div>`).join('');
  return `<div class="clock-body" style="overflow-y:auto;height:100%">
    <div class="analog-clock" id="analog-clock">

function initClockApp() {
  updateClockApp();
  setInterval(updateClockApp, 1000);
}
function updateClockApp() {
  const now = new Date();
  const h = now.getHours() % 12;
  const m = now.getMinutes();
  const s = now.getSeconds();
  const hd = document.getElementById('hour-hand');
  const md = document.getElementById('min-hand');
  const sd = document.getElementById('sec-hand');
  if (hd) hd.style.transform = `rotate(${(h*30)+(m*0.5)}deg)`;
  if (md) md.style.transform = `rotate(${m*6}deg)`;
  if (sd) sd.style.transform = `rotate(${s*6}deg)`;
  const zones = [{city:'еҢ—дә¬',tz:'Asia/Shanghai'},{city:'зәҪзәҰ',tz:'America/New_York'},{city:'дјҰж•Ұ',tz:'Europe/London'},{city:'дёңдә¬',tz:'Asia/Tokyo'}];
  zones.forEach(z => {
    const el = document.getElementById('wt-'+z.city);
    if (el) el.textContent = now.toLocaleTimeString('zh-CN',{timeZone:z.tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  });
}

function buildMusic() {
  const t = tracks[musicIdx];

function initMusic() {
  if (musicPlaying) startMusicTimer();
}
function musicToggle() {
  musicPlaying = !musicPlaying;
  const ico = document.getElementById('music-playico');
  if (ico) ico.textContent = musicPlaying ? 'вҸё' : 'в–¶';
  if (musicPlaying) startMusicTimer(); else { clearInterval(musicTimer); musicTimer=null; }
}
function startMusicTimer() {
  if (musicTimer) clearInterval(musicTimer);
  musicTimer = setInterval(() => {
    musicProgress = (musicProgress+0.3) % 100;
    const prog = document.getElementById('music-prog');
    if (prog) prog.style.width = musicProgress+'%';
    const total = parseDur(tracks[musicIdx].dur);
    const cur = document.getElementById('music-cur');
    const secs = Math.floor(total*musicProgress/100);
    if (cur) cur.textContent = `${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`;
  }, 300);
}
function parseDur(s) { const [m,sec]=s.split(':'); return parseInt(m)*60+parseInt(sec); }
function musicSelect(i) {
  musicIdx=i; musicProgress=0;
  const win = document.getElementById('wb-music');
  if (win) win.innerHTML = buildMusic();
  if (musicPlaying) startMusicTimer();
}
function musicNext() { musicSelect((musicIdx+1)%tracks.length); }
function musicPrev() { musicSelect((musicIdx-1+tracks.length)%tracks.length); }
function musicSeek(e,el) {
  const rect = el.getBoundingClientRect();
  musicProgress = (e.clientX-rect.left)/rect.width*100;

function buildNotes() {

function renderNotesList() {
  const list = document.getElementById('note-list');

  if (activeNote) {

    if (titleEl) titleEl.value = activeNote.title;

}
function notesOpen(id) {
  activeNote = notesList.find(n=>n.id===id);

function notesNew() {
  const n = { id: Date.now(), title:'ж–°дҫҝзӯҫ', content:'', date: new Date().toLocaleDateString() };

function noteSave() {
  if (!activeNote) return;
  activeNote.title = document.getElementById('note-title')?.value || '';
  activeNote.content = document.getElementById('note-content')?.value || '';
  const list = document.getElementById('note-list');

    const item = list.querySelector('.note-list-item.active .note-item-title');
    if (item) item.textContent = activeNote.title||'ж— ж Үйўҳ';

/* в”Җв”Җ DRAW в”Җв”Җ */
const drawColors = ['#ffffff','#60a5fa','#a78bfa','#34d399','#fbbf24','#f87171','#f97316','#000000'];
const drawSizes = [2, 4, 8, 14];
function buildDraw() {
  const colors = drawColors.map(c => `<div class="draw-color ${c===drawColor?'selected':''}" style="background:${c}" onclick="setDrawColor('${c}')"></div>`).join('');
  const sizes = drawSizes.map(s => `<div class="fm-btn" onclick="drawSize=${s};notify('з”»жқҝ','зәҝе®Ҫ:${s}')" style="width:${s+16}px;height:${s+16}px;border-radius:50%;padding:0"></div>`).join('');
  return `<div class="draw-body">
    <div class="draw-toolbar">
      <button class="fm-btn ${drawTool==='pen'?'active':''}" onclick="drawTool='pen'">вңҸпёҸ з”»з¬”</button>
      <button class="fm-btn ${drawTool==='eraser'?'active':''}" onclick="drawTool='eraser'">рҹ§№ ж©Ўзҡ®</button>
      <button class="fm-btn" onclick="drawLine()">рҹ“Ҹ зӣҙзәҝ</button>
      <div class="tool-sep"></div>
      ${colors}
      <div class="tool-sep"></div>
      <button class="fm-btn" onclick="clearDraw()">рҹ—‘пёҸ жё…з©ә</button>
      <button class="fm-btn" onclick="saveDraw()">рҹ’ҫ дҝқеӯҳ</button>
    </div>
    <canvas id="draw-canvas" class="draw-canvas"></canvas>
  </div>`;
}
function initDraw() {
  setTimeout(() => {
    const canvas = document.getElementById('draw-canvas');
    if (!canvas) return;
    const body = canvas.parentElement;
    canvas.width = body.offsetWidth;
    canvas.height = body.offsetHeight - 50;
    drawCtx = canvas.getContext('2d');
    drawCtx.fillStyle = '#ffffff';
    drawCtx.fillRect(0,0,canvas.width,canvas.height);
    canvas.addEventListener('mousedown', e => {
      isDrawing=true;
      const r=canvas.getBoundingClientRect();
      lastX=e.clientX-r.left; lastY=e.clientY-r.top;
    });
    canvas.addEventListener('mousemove', e => {
      if (!isDrawing) return;
      const r=canvas.getBoundingClientRect();
      const x=e.clientX-r.left, y=e.clientY-r.top;
      drawCtx.beginPath();
      drawCtx.moveTo(lastX,lastY);
      drawCtx.lineTo(x,y);
      drawCtx.strokeStyle = drawTool==='eraser'?'#ffffff':drawColor;
      drawCtx.lineWidth = drawTool==='eraser'?20:drawSize;
      drawCtx.lineCap='round';
      drawCtx.lineJoin='round';
      drawCtx.stroke();
      lastX=x; lastY=y;
    });
    canvas.addEventListener('mouseup', () => isDrawing=false);
    canvas.addEventListener('mouseleave', () => isDrawing=false);
  }, 100);
}
function setDrawColor(c) {
  drawColor=c; drawTool='pen';
  document.querySelectorAll('.draw-color').forEach(el => el.classList.toggle('selected', el.style.background===c));
}
function clearDraw() {
  if (!drawCtx) return;
  const canvas = document.getElementById('draw-canvas');
  drawCtx.fillStyle='#ffffff';
  drawCtx.fillRect(0,0,canvas.width,canvas.height);
}
function saveDraw() {
  const canvas = document.getElementById('draw-canvas');
  if (!canvas) return;
  const a = document.createElement('a');
  a.download = 'drawing.png';
  a.href = canvas.toDataURL();
  a.click();
  notify('з”»жқҝ','еӣҫзүҮе·ІдёӢиҪҪ');
}
function drawLine() { notify('з”»жқҝ','зӣҙзәҝе·Ҙе…· - зӮ№еҮ»е№¶жӢ–жӢҪ'); }

/* в”Җв”Җ KEYBOARD SHORTCUTS в”Җв”Җ */
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key==='1') { e.preventDefault(); openApp('terminal'); }
    if (e.key==='2') { e.preventDefault(); openApp('files'); }
    if (e.key==='3') { e.preventDefault(); openApp('editor'); }
    if (e.key==='4') { e.preventDefault(); openApp('calc'); }
    if (e.key==='m') { e.preventDefault(); if(focusedWin) minimizeWin(focusedWin); }
    if (e.key==='w') { e.preventDefault(); if(focusedWin) closeWin(focusedWin); }
    if (e.key==='f') { e.preventDefault(); if(focusedWin) maximizeWin(focusedWin); }
  }
  if (e.key === 'Escape') { toggleMenu(false); closeCtx(); }
});
